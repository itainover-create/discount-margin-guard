# shopify.app.toml המעודכן עבור Profit Guard

client_id = "b275ac1a02242b72a48d9f1811c5f57a"
name = "profit-guard"
application_url = "https://discount-margin-guard.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

# ה-Webhooks מנוטרלים כרגע כדי למנוע שגיאות ב-Localhost
# [[webhooks.subscriptions]]
# topics = [ "app/uninstalled" ]
# uri = "/webhooks/app/uninstalled"

[access_scopes]
# אלו ההרשאות המדויקות שאנחנו צריכים ל-Sacred Query
scopes = "read_orders,read_products"

application_url = "https://discount-margin-guard.onrender.com"

[auth]
redirect_urls = [
  "https://discount-margin-guard.onrender.com/api/auth",
  "https://discount-margin-guard.onrender.com/api/auth/callback"
]